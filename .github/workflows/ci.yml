name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
      - run: uv python install 3.13
      - run: uv sync --locked
      - run: uv run ruff check src tests scripts
      - run: uv run ruff format --check src tests scripts
      - run: uv run mypy
      - run: uv run pyright

  test:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
      - run: uv python install 3.13
      - run: uv sync --locked
      - run: uv run pytest --cov -q

  security:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
      - run: uv python install 3.13
      - run: uv sync --locked
      - run: uv lock --check
      - run: uv run bandit -c pyproject.toml -ll -r src scripts
      - run: uvx semgrep --config p/python --config p/owasp-top-ten --config p/secrets --error --metrics=off .
      - run: uv run pip-audit --skip-editable -l
      - run: uv run pip-licenses --fail-on GPL-3.0

  contracts:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
      - run: uv python install 3.13
      - run: uv sync --locked
      - run: uv run pytest -m contracts -q
